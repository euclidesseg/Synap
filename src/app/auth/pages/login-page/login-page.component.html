<div class="p-8 md:p-12 lg:p-16 flex flex-col justify-between h-full">

    <!-- Header -->
    <div class="flex items-center gap-2 mb-8">
        <div class="w-9 h-9 bg-brand-slate rounded-lg flex items-center justify-center text-white font-black text-xl">
            S
        </div>

        <span class="text-xl font-bold tracking-tight text-brand-slate">
            Synap
        </span>
    </div>

    <!-- Formulario -->
    <div class="my-auto py-4">

        <div class="mb-8">
            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900">
                Bienvenido de vuelta
            </h2>

            <p class="text-slate-500 text-sm mt-2">
                Continúa tu exploración científica y literaria.
            </p>
        </div>


        <form class="space-y-5">

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                    Correo Electrónico
                </label>

                <input type="email" placeholder="tu@correo.com"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">
                    Contraseña
                </label>

                <input type="password" placeholder="••••••••"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none">
            </div>

            <button
                class="w-full bg-brand-slate hover:bg-brand-lime hover:text-brand-slate text-white font-semibold py-3 rounded-lg cursor-pointer">
                Ingresar
            </button>

        </form>

        <div class="relative flex items-center py-4">

            <div class="flex-grow border-t border-slate-200"></div>

            <span class="mx-4 text-xs uppercase tracking-wider text-slate-400 font-semibold">
                o continúa con
            </span>

            <div class="flex-grow border-t border-slate-200"></div>

        </div>

        <div class="space-y-3 mb-6">

            <!-- Google -->
            <button type="button"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 mb-4 border border-slate-200 rounded-lg bg-white hover:bg-slate-50 transition-all duration-200 cursor-pointer">

                <!-- Icono Google -->
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>

                <span class="font-medium text-slate-700">
                    Continuar con Google
                </span>
            </button>

            <!-- GitHub -->
            <button type="button"
                class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-lg bg-slate-900 hover:bg-black transition-all duration-200 cursor-pointer">

                <!-- Icono GitHub -->
                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">

                    <path
                        d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2.17c-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.2 1.77 1.2 1.03 1.76 2.7 1.25 3.35.95.1-.75.4-1.25.72-1.54-2.56-.3-5.25-1.28-5.25-5.68 0-1.25.45-2.28 1.2-3.08-.12-.3-.52-1.5.12-3.12 0 0 .97-.31 3.2 1.18a11.1 11.1 0 0 1 5.82 0c2.23-1.5 3.2-1.18 3.2-1.18.64 1.62.24 2.82.12 3.12.75.8 1.2 1.83 1.2 3.08 0 4.41-2.7 5.38-5.27 5.67.41.36.77 1.08.77 2.18v3.24c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z" />
                </svg>

                <span class="font-medium text-white">
                    Continuar con GitHub
                </span>
            </button>

        </div>

    </div>

    <!-- Footer -->
    <div class="border-t border-slate-100 pt-6 mt-8 text-center text-sm">
        <span class="text-slate-500">
            ¿No tienes una cuenta?
        </span>

        <a routerLink="/auth/sign-up" class="text-brand-slate font-bold ml-1 hover:underline">
            Regístrate
        </a>
    </div>

</div>
