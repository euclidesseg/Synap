<section class="w-full mx-auto overflow-hidden h-screen">
  <header class="sticky inset-0 z-20 w-full flex flex-row flex-wrap items-center justify-between p-4 mx-auto border-b border-slate-300 bg-slate-100">
    <div class="w-1/2">
      <div class="bg-brand-blue w-10 h-10 text-white flex items-center justify-center text-xl font-bold rounded-lg">
      S
      </div>
    </div>
    <div class="w-1/2 bg-red h-10 flex items-center justify-end gap-4">
      <button class="px-2 py-2 rounded-lg flex items-center gap-4 font-semibold cursor-pointer text-black border border-slate-300 border-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1"><path d="M12 5c-5.444 0-8.469 4.234-9.544 6.116c-.221.386-.331.58-.32.868c.013.288.143.476.402.852C3.818 14.694 7.294 19 12 19s8.182-4.306 9.462-6.164c.26-.376.39-.564.401-.852s-.098-.482-.319-.868C20.47 9.234 17.444 5 12 5Z"/><circle cx="12" cy="12" r="3"/></g>
      </svg>        
          Vista previa
      </button>
      <button class="bg-brand-blue px-2 py-2 flex items-center gap-4  rounded-lg font-semibold cursor-pointer text-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <g fill="none" stroke="currentColor" stroke-width="1">
            <path d="M16 21v-2c0-1.886 0-2.828-.586-3.414S13.886 15 12 15h-1c-1.886 0-2.828 0-3.414.586S7 17.114 7 19v2"/>
            <path stroke-linecap="round" d="M7 8h5"/>
            <path d="M3 9c0-2.828 0-4.243.879-5.121C4.757 3 6.172 3 9 3h7.172c.408 0 .613 0 .796.076s.329.22.618.51l2.828 2.828c.29.29.434.434.51.618c.076.183.076.388.076.796V15c0 2.828 0 4.243-.879 5.121C19.243 21 17.828 21 15 21H9c-2.828 0-4.243 0-5.121-.879C3 19.243 3 17.828 3 15z"/>
          </g>
        </svg>
        Guardar
      </button>
      <button class="bg-brand-lime flex items-center justify-center gap-4 px-2 py-2 rounded-lg font-semibold cursor-pointer text-balck">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" d="M5.5 13L18 6m-1.75 17.5h.25a72.7 72.7 0 0 1 6.504-21.962L23.26 1L23 .74l-.538.256A72.7 72.7 0 0 1 .5 7.5v.25l5 5v7.75h.25l1.774-1.69a12 12 0 0 1 2.313-1.723z" stroke-width="1"/></svg>
        Publicar
      </button>
    </div>
  </header>

  <div class="flex justify-between gap-4 bg-white">
    <div class="w-2/3 py-4">
      <editor-component></editor-component>
    </div>
    <div class="w-1/3 max-w-lg bg-white p-4">
      <form action="" class="bg-slate-100 p-4 rounded-lg shadow-sm">
        <h3 class="flex items-center gap-2 text-xs font-bold text-slate-500">
         <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-500" width="20" height="20" viewBox="0 0 32 32">
          <path fill="#62748e" d="m23.265 24.381l.9-.894c4.164.136 4.228-.01 4.411-.438l1.144-2.785l.085-.264l-.093-.231c-.049-.122-.2-.486-2.8-2.965V15.5c3-2.89 2.936-3.038 2.765-3.461l-1.139-2.814c-.171-.422-.236-.587-4.37-.474l-.9-.93a20 20 0 0 0-.141-4.106l-.116-.263l-2.974-1.3c-.438-.2-.592-.272-3.4 2.786l-1.262-.019c-2.891-3.086-3.028-3.03-3.461-2.855L9.149 3.182c-.433.175-.586.237-.418 4.437l-.893.89c-4.162-.136-4.226.012-4.407.438l-1.146 2.786l-.09.267l.094.232c.049.12.194.48 2.8 2.962v1.3c-3 2.89-2.935 3.038-2.763 3.462l1.138 2.817c.174.431.236.584 4.369.476l.9.935a20.2 20.2 0 0 0 .137 4.1l.116.265l2.993 1.308c.435.182.586.247 3.386-2.8l1.262.016c2.895 3.09 3.043 3.03 3.466 2.859l2.759-1.115c.436-.173.588-.234.413-4.436m-11.858-6.524a4.957 4.957 0 1 1 6.488 2.824a5.014 5.014 0 0 1-6.488-2.824"/>
        </svg>
          CONFIGURACIÓN
        </h3>

        <div class="mt-4 flex flex-col gap-2">
          <label for="" class="font-semibold">Categoría</label>

          <div class="select__menu">
            <div (click)="showMenuOptions()" class="bg-white block w-full max-w-70 rounded-lg p-2 border border-slate-300 cursor-pointer">
              <span>{{category()}}</span>
            </div>
            <ul [class.block]="menuOpen()"[class.hidden]="!menuOpen()" class="absolute bg-white w-full max-w-70 rounded-lg p-2 mt-1 shadow-lg">
              <li (click)="selectOption('Ciencia')" class="list-none hover:bg-brand-blue/10 cursor-pointer rounded-lg py-1 px-2">Ciencia</li>
              <li (click)="selectOption('Matematicas')" class="list-none hover:bg-brand-blue/10 cursor-pointer rounded-lg py-1 px-2">Matematicas</li>
              <li (click)="selectOption('Ingenieria')" class="list-none hover:bg-brand-blue/10 cursor-pointer rounded-lg py-1 px-2">Ingenieria</li>
              <li (click)="selectOption('Computación')" class="list-none hover:bg-brand-blue/10 cursor-pointer rounded-lg py-1 px-2">Computación</li>
              <li (click)="selectOption('Ciencia')" class="list-none hover:bg-brand-blue/10 cursor-pointer rounded-lg py-1 px-2">Cine</li>
            </ul>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>
